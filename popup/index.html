<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Capture & Analyze</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="header-left">
          <h1>Capture</h1>
          <button id="openSettingsButton" class="ghost-button" type="button">
            Settings
          </button>
        </div>
        <div class="mode-toggle" role="group" aria-label="Capture mode">
          <button data-mode="text" class="mode-button active">Text</button>
          <button data-mode="image" class="mode-button">Screenshot</button>
        </div>
      </header>

      <div class="controls">
        <button id="captureButton" class="primary">Capture</button>
        <button id="analyzeButton" class="secondary" disabled>Analyze</button>
      </div>

      <section class="accordion-section" data-section="selection">
        <button class="accordion-header" type="button">
          <span class="accordion-title">
            <span class="accordion-icon">▼</span>
            <span id="captureTypeLabel">Selection</span>
            <span id="timestampLabel" class="accordion-subtitle"></span>
          </span>
          <div class="accordion-header-actions">
            <select id="languageSelect" class="language-select">
              <option value="en">English</option>
              <option value="fr">Français</option>
              <option value="ja">日本語</option>
              <option value="auto">Auto detect</option>
            </select>
            <button id="clearCaptureButton" class="tertiary small" disabled>Clear</button>
          </div>
        </button>
        <div class="accordion-content">
          <div id="detailsContent" class="details-content empty">
            Select text on the page or capture a screenshot region to get started.
          </div>
          <div id="imageMeta" class="image-meta hidden"></div>
        </div>
      </section>

      <section class="accordion-section" data-section="instructions">
        <button class="accordion-header" type="button">
          <span class="accordion-title">
            <span class="accordion-icon">▼</span>
            <span>Custom instructions</span>
          </span>
          <button id="clearInstructionsButton" class="tertiary small" disabled onclick="event.stopPropagation()">Clear</button>
        </button>
        <div class="accordion-content">
          <textarea id="instructionsInput" rows="3" placeholder="Add context for the analysis... If not provided, a summary of the captured content will be supplied"></textarea>
        </div>
      </section>

      <section class="accordion-section" data-section="result">
        <button class="accordion-header" type="button">
          <span class="accordion-title">
            <span class="accordion-icon">▼</span>
            <span>Analysis result</span>
          </span>
        </button>
        <div class="accordion-content">
          <span id="statusLabel">Idle</span>
          <div id="resultPayload" class="result-payload hidden"></div>
          <button id="copyResultButton" class="tertiary" disabled>Copy result</button>
        </div>
      </section>
    </main>

    <script src="marked.min.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
