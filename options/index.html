<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Capture & Analyze Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="settings">
      <header>
        <h1>Extension Settings</h1>
        <p>Configure the analysis endpoint base URL required for captures.</p>
      </header>

      <form id="settingsForm">
        <label>
          <span>Analysis endpoint base URL</span>
          <input
            id="endpointInput"
            type="url"
            name="endpoint"
            placeholder="https://api.example.com"
            required
          />
          <small class="hint">Text and image requests will be sent to <code>/text</code> and <code>/image</code> endpoints respectively.</small>
        </label>

        <div class="actions">
          <button id="saveSettingsButton" type="submit" disabled>Save</button>
          <span id="optionsStatus" class="status"></span>
        </div>
      </form>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
