<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Capture & Analyze Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="settings">
      <header>
        <h1>Extension Settings</h1>
        <p>Configure the analysis endpoint base URL required for captures.</p>
      </header>

      <form id="settingsForm">
        <label>
          <span>Analysis endpoint base URL</span>
          <input
            id="endpointInput"
            type="url"
            name="endpoint"
            placeholder="http://localhost:5261/api"
            required
          />
          <small class="hint">Enter the base URL up to and including <code>/api</code>. Designed to work with the <a href="https://github.com/herveblondeau/Workflow" target="_blank" rel="noopener noreferrer">Workflow</a> API.</small>
        </label>

        <label>
          <span>API key</span>
          <input
            id="apiKeyInput"
            type="password"
            name="apiKey"
            placeholder="Your API key"
            autocomplete="off"
          />
          <small class="hint">Sent as the <code>X-Api-Key</code> header with every request. Leave blank if not required.</small>
        </label>

        <div class="actions">
          <button id="saveSettingsButton" type="submit" disabled>Save</button>
          <span id="optionsStatus" class="status"></span>
        </div>
      </form>

      <section class="model-section">
        <div class="model-section-header">
          <h2>Model</h2>
          <button id="refreshModelsButton" type="button">Refresh</button>
        </div>
        <span id="modelsStatus" class="status"></span>

        <label>
          <span>Provider</span>
          <select id="providerSelect" disabled>
            <option value="">— no providers loaded —</option>
          </select>
        </label>

        <label>
          <span>Model</span>
          <select id="modelSelect" disabled>
            <option value="">— select a provider first —</option>
          </select>
        </label>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
